<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful Quest - Level Up Your Focus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:italic,wght@0,400;1,500&family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Quicksand', sans-serif; overflow: hidden; background: #000; }
        .font-lora { font-family: 'Lora', serif; }
        
        .breathing { animation: breathe 5s ease-in-out infinite; }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, 0) scale(1); }
            50% { transform: translate(-50%, -10px) scale(1.01); }
        }

        .ring-anim { animation: ring 4s ease-in-out infinite; }
        @keyframes ring {
            0% { transform: scale(0.8); opacity: 0.2; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(0.8); opacity: 0.2; }
        }

        .glass {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(129, 140, 248, 0.5); border-radius: 10px; }

        .fade-transition { transition: opacity 0.5s ease, visibility 0.5s ease; }
        .fade-out { opacity: 0; visibility: hidden; position: absolute; }
        .fade-in { opacity: 1; visibility: visible; position: relative; }
    </style>
</head>
<body class="relative h-screen w-full flex flex-col items-center justify-between text-white">

    <div class="fixed inset-0 z-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1518112390110-6012b1f5c2e1?auto=format&fit=crop&q=80&w=2000')"></div>
    <div id="overlay" class="fixed inset-0 z-10 bg-black pointer-events-none" style="opacity: 0; transition: opacity 1s linear;"></div>

    <img id="elara" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Mascot_of_Wikipedia_Anime_Project.png/400px-Mascot_of_Wikipedia_Anime_Project.png" 
         class="fixed bottom-0 left-1/2 -translate-x-1/2 h-[80vh] z-20 breathing object-contain pointer-events-none opacity-90" alt="Elara">

    <header class="relative z-40 w-full p-6 flex justify-between items-start">
        <div class="flex flex-col gap-1">
            <h1 class="text-2xl font-bold tracking-widest text-indigo-300 drop-shadow-md">MINDFUL QUEST</h1>
            <div class="flex items-center gap-3 mt-1 bg-black/40 px-3 py-1.5 rounded-full border border-white/10 w-max">
                <div class="bg-indigo-500 rounded-full h-6 w-6 flex items-center justify-center font-bold text-xs" id="user-level">1</div>
                <div class="flex flex-col">
                    <div class="text-[10px] font-bold text-indigo-200 tracking-wider">EXP POINTS</div>
                    <div class="w-32 h-1.5 bg-slate-700 rounded-full mt-0.5">
                        <div id="exp-bar" class="h-full bg-indigo-400 rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div id="timer" class="text-5xl font-light tracking-tighter fade-transition fade-out opacity-90 mt-4">00:00</div>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleJournal()" class="glass px-5 py-2.5 rounded-full text-sm font-bold hover:bg-indigo-600/30 transition flex items-center gap-2 shadow-lg">
                📊 Statistik & Jurnal
            </button>
            <button id="audio-toggle" onclick="toggleAudio()" class="glass p-3 rounded-full hover:bg-white/10 transition">
                <svg id="vol-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-50" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.983 5.983 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.984 3.984 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>
    </header>

    <div id="breath-ring" class="fixed inset-0 flex items-center justify-center z-30 fade-transition fade-out">
        <div class="w-72 h-72 border-4 border-indigo-400 rounded-full ring-anim shadow-[0_0_30px_rgba(129,140,248,0.5)]"></div>
    </div>

    <main class="relative z-40 w-full max-w-4xl px-6 mb-12">
        <div class="glass rounded-3xl p-8 min-h-[220px] shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex flex-col justify-between">
            <div id="dialog-container" class="flex-1">
                <span class="text-indigo-300 font-bold text-xs tracking-widest uppercase mb-2 block">Elara</span>
                <p id="dialog-text" class="font-lora text-xl md:text-2xl italic leading-relaxed min-h-[60px]"></p>
            </div>

            <div id="home-controls" class="mt-6 flex flex-col md:flex-row gap-4 items-center fade-transition fade-in">
                <input type="text" id="user-intent" placeholder="Fokusku hari ini adalah..." 
                       class="w-full flex-1 bg-slate-900/60 border border-indigo-500/30 rounded-xl px-5 py-3 focus:outline-none focus:border-indigo-400 transition">
                <select id="duration" class="w-full md:w-32 bg-slate-900/80 border border-indigo-500/30 rounded-xl px-4 py-3 outline-none cursor-pointer hover:bg-slate-800 transition">
                    <option value="1">1 Menit</option>
                    <option value="25" selected>25 Menit</option>
                    <option value="45">45 Menit</option>
                </select>
                <button onclick="startBreathing()" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 px-8 py-3 rounded-xl font-bold transition-all shadow-lg active:scale-95 border border-indigo-400/50">Mulai Perjalanan</button>
            </div>

            <div id="reward-controls" class="mt-6 fade-transition fade-out">
                <button onclick="resetApp()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition shadow-lg active:scale-95">Kembali ke Realita (+ EXP)</button>
            </div>
        </div>
    </main>

    <div id="journal-modal" class="fixed inset-0 z-50 glass fade-transition fade-out flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-2xl rounded-3xl p-8 border border-white/10 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold tracking-tight flex items-center gap-2">📊 Dashboard Analitik</h2>
                <button onclick="toggleJournal()" class="text-white/50 hover:text-white text-3xl">&times;</button>
            </div>
            
            <div class="overflow-y-auto custom-scroll flex-1 pr-4">
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5 mb-6">
                    <h3 class="text-sm font-bold text-indigo-300 mb-2">Tren Fokus 7 Hari Terakhir (Menit)</h3>
                    <canvas id="focusChart" height="150"></canvas>
                </div>

                <h3 class="text-sm font-bold text-slate-400 mb-3 uppercase tracking-widest">Riwayat Perjalanan</h3>
                <div id="journal-content" class="space-y-3">
                    </div>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>
    <audio id="chime" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        let totalSeconds = 0, timeLeft = 0, timerInterval = null;
        let isPaused = false, audioPlaying = false;
        let milestones = { half: false, fiveMin: false, oneMin: false };
        let chartInstance = null; // Menyimpan instance grafik

        const ui = {
            dialog: document.getElementById('dialog-text'),
            overlay: document.getElementById('overlay'),
            timer: document.getElementById('timer'),
            homeControls: document.getElementById('home-controls'),
            rewardControls: document.getElementById('reward-controls'),
            breathRing: document.getElementById('breath-ring'),
            journalModal: document.getElementById('journal-modal'),
            journalContent: document.getElementById('journal-content')
        };

        // --- SISTEM RPG & EXP ---
        function loadPlayerData() {
            const exp = parseInt(localStorage.getItem('mindful_exp') || '0');
            const level = Math.floor(exp / 100) + 1;
            const expInCurrentLevel = exp % 100;
            
            document.getElementById('user-level').innerText = level;
            document.getElementById('exp-bar').style.width = `${expInCurrentLevel}%`;
        }

        function addExp(minutes) {
            let currentExp = parseInt(localStorage.getItem('mindful_exp') || '0');
            currentExp += (minutes * 10); // 1 Menit = 10 EXP
            localStorage.setItem('mindful_exp', currentExp);
            loadPlayerData();
        }

        // --- CORE FUNCTIONS ---
        function switchState(hideEl, showEl) {
            if(hideEl) { hideEl.classList.remove('fade-in'); hideEl.classList.add('fade-out'); }
            if(showEl) { showEl.classList.remove('fade-out'); showEl.classList.add('fade-in'); }
        }

        async function typeWriter(text) {
            ui.dialog.innerHTML = '';
            let i = 0;
            return new Promise(res => {
                const int = setInterval(() => {
                    if (i < text.length) { ui.dialog.innerHTML += text.charAt(i); i++; } 
                    else { clearInterval(int); res(); }
                }, 35);
            });
        }

        function toggleAudio() {
            const music = document.getElementById('bg-music'), icon = document.getElementById('vol-icon');
            audioPlaying ? music.pause() : music.play();
            icon.style.opacity = audioPlaying ? '0.5' : '1';
            audioPlaying = !audioPlaying;
        }

        async function init() {
            loadPlayerData();
            await typeWriter("Selamat datang kembali. Aku Elara. Apa yang membebani pikiranmu hari ini?");
        }

        async function startBreathing() {
            const intent = document.getElementById('user-intent').value.trim();
            if (!intent) return typeWriter("Tuliskan dulu tugas atau masalahmu. Jangan memendamnya sendiri.");
            
            switchState(ui.homeControls, ui.breathRing);
            await typeWriter("Tarik napas... Tahan... Hembuskan...");
            setTimeout(() => { switchState(ui.breathRing, null); startFocus(intent); }, 8000);
        }

        function startFocus(intent) {
            const duration = parseInt(document.getElementById('duration').value);
            totalSeconds = duration * 60; timeLeft = totalSeconds;
            milestones = { half: false, fiveMin: false, oneMin: false };
            
            switchState(null, ui.timer);
            updateTimerDisplay();
            typeWriter(`Aku di sini. Fokuslah pada "${intent}". Kita selesaikan ini bersama.`);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (isPaused) return;
            timeLeft--; updateTimerDisplay();
            ui.overlay.style.opacity = (1 - (timeLeft / totalSeconds)) * 0.7;

            // Passive Engagement
            if (timeLeft === Math.floor(totalSeconds / 2) && !milestones.half) {
                milestones.half = true; typeWriter("Separuh jalan. Kamu melakukan progres yang luar biasa.");
            } else if (timeLeft === 300 && totalSeconds > 300 && !milestones.fiveMin) {
                milestones.fiveMin = true; typeWriter("Tinggal 5 menit. Jangan terburu-buru, selesaikan dengan tenang.");
            } else if (timeLeft === 60 && !milestones.oneMin) {
                milestones.oneMin = true; typeWriter("Satu menit terakhir. Bertahanlah, kamu hampir menang.");
            }

            if (timeLeft <= 0) finishFocus();
        }

        function updateTimerDisplay() {
            ui.timer.innerText = `${Math.floor(timeLeft / 60).toString().padStart(2, '0')}:${(timeLeft % 60).toString().padStart(2, '0')}`;
        }

        function finishFocus() {
            clearInterval(timerInterval); document.getElementById('chime').play();
            switchState(ui.timer, ui.rewardControls); ui.overlay.style.opacity = 0.7;
            
            const dur = document.getElementById('duration').value;
            const earnedExp = dur * 10;
            typeWriter(`Luar biasa. Waktu berhasil ditaklukkan. Kamu mendapatkan +${earnedExp} EXP!`);

            saveJournal(document.getElementById('user-intent').value, dur);
            addExp(dur); // Berikan hadiah exp
        }

        function saveJournal(intent, dur) {
            const logs = JSON.parse(localStorage.getItem('mindful_logs') || '[]');
            const todayDate = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD format for chart sorting
            logs.push({
                date: new Date().toLocaleDateString('id-ID', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' }),
                rawDate: todayDate,
                intent: intent,
                duration: parseInt(dur)
            });
            localStorage.setItem('mindful_logs', JSON.stringify(logs));
        }

        // --- DASHBOARD & CHART SYSTEM ---
        function toggleJournal() {
            if (ui.journalModal.classList.contains('fade-out')) {
                renderJournal();
                renderChart();
                switchState(null, ui.journalModal);
            } else {
                switchState(ui.journalModal, null);
            }
        }

        function renderJournal() {
            const logs = JSON.parse(localStorage.getItem('mindful_logs') || '[]');
            ui.journalContent.innerHTML = logs.reverse().map(log => `
                <div class="p-3 bg-white/5 rounded-xl border border-indigo-500/20 hover:bg-white/10 transition flex justify-between items-center">
                    <div>
                        <h3 class="text-sm font-semibold text-white/90">🎯 ${log.intent}</h3>
                        <p class="text-[10px] text-indigo-300 font-bold">${log.date}</p>
                    </div>
                    <div class="text-right">
                        <span class="bg-indigo-500/20 text-indigo-300 text-xs px-2 py-1 rounded font-bold">${log.duration} Menit</span>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-white/30 py-5 italic">Perjalananmu belum dimulai...</p>';
        }

        function renderChart() {
            const logs = JSON.parse(localStorage.getItem('mindful_logs') || '[]');
            
            // Agregasi data durasi per hari
            const groupedData = {};
            logs.forEach(log => {
                groupedData[log.rawDate] = (groupedData[log.rawDate] || 0) + log.duration;
            });

            // Ambil 7 hari terakhir
            const labels = Object.keys(groupedData).slice(-7);
            const dataPoints = labels.map(date => groupedData[date]);

            // Hapus grafik lama jika ada (mencegah bug tumpuk)
            if(chartInstance) chartInstance.destroy();

            const ctx = document.getElementById('focusChart').getContext('2d');
            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = 'Quicksand';

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels.length ? labels : ['Belum ada data'],
                    datasets: [{
                        label: 'Total Fokus (Menit)',
                        data: dataPoints.length ? dataPoints : [0],
                        backgroundColor: 'rgba(99, 102, 241, 0.8)', // Indigo
                        borderRadius: 6,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function resetApp() {
            switchState(ui.rewardControls, ui.homeControls);
            ui.overlay.style.opacity = 0;
            document.getElementById('user-intent').value = '';
            init();
        }

        // Anti-cheat
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && timerInterval && timeLeft > 0) isPaused = true;
            else if (!document.hidden && timerInterval && timeLeft > 0) {
                isPaused = false;
                typeWriter("Kamu kembali. Tarik napas, buang semua distraksi, dan mari lanjutkan.");
            }
        });

        window.onload = init;
    </script>
</body>
</html>
