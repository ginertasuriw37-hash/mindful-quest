<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Mindful Quest - AI Focus Ecosystem</title>
    <meta name="description" content="Tingkatkan produktivitas dan singkirkan distraksi dengan Mindful Quest. Ekosistem fokus berbasis AI yang dilengkapi analitik lokal dan gamifikasi.">
    <meta property="og:title" content="Mindful Quest - AI Focus Ecosystem">
    <meta property="og:description" content="Tingkatkan produktivitas dan singkirkan distraksi dengan Mindful Quest. Ekosistem fokus berbasis AI yang dilengkapi analitik lokal dan gamifikasi.">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; background: #020617; color: white; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .aurora-bg {
            background: linear-gradient(-45deg, #020617, #1e1b4b, #0f172a, #312e81);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: fixed; inset: 0; z-index: 0;
        }
        @media (prefers-reduced-motion: reduce) { .aurora-bg { animation: none; background: #0f172a; } }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .orb-container {
            position: fixed; bottom: 22%; left: 50%; transform: translateX(-50%); z-index: 20;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .ai-orb {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #818cf8, #3730a3);
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.6), inset 0 0 20px rgba(255,255,255,0.5);
            animation: orbBreathe 4s ease-in-out infinite, orbFloat 6s ease-in-out infinite;
            transition: all 1s ease;
        }
        .ai-orb.focus-mode {
            background: radial-gradient(circle at 30% 30%, #f43f5e, #881337);
            box-shadow: 0 0 50px rgba(244, 63, 94, 0.6), inset 0 0 20px rgba(255,255,255,0.5);
            animation-duration: 2s, 6s;
        }
        .ai-orb.critical-mode {
            background: radial-gradient(circle at 30% 30%, #fbbf24, #b45309);
            box-shadow: 0 0 70px rgba(251, 191, 36, 0.8), inset 0 0 20px rgba(255,255,255,0.8);
            animation-duration: 0.8s, 4s;
        }

        @keyframes orbBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes orbFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(129, 140, 248, 0.5); border-radius: 10px; }
        
        .fade-transition { transition: opacity 0.4s ease, visibility 0.4s ease, transform 0.4s ease; }
        .fade-out { opacity: 0; visibility: hidden; position: absolute; transform: translateY(10px); pointer-events: none; }
        .fade-in { opacity: 1; visibility: visible; position: relative; transform: translateY(0); pointer-events: auto; }
    </style>
</head>
<body class="relative h-screen w-full flex flex-col items-center justify-between">

    <div class="aurora-bg" aria-hidden="true"></div>
    <div id="overlay" class="fixed inset-0 z-10 bg-black pointer-events-none" style="opacity: 0; transition: opacity 1s linear;" aria-hidden="true"></div>

    <div class="orb-container pointer-events-none" aria-hidden="true">
        <div id="elara-orb" class="ai-orb"></div>
        <div class="mt-6 text-indigo-300/50 tracking-[0.3em] text-xs font-bold">ELARA.SYS</div>
    </div>

    <header class="relative z-40 w-full p-6 flex flex-col md:flex-row justify-between items-start gap-4">
        <div class="flex flex-col gap-2">
            <h1 class="text-xl font-bold tracking-widest text-indigo-100 drop-shadow-md">MINDFUL QUEST</h1>
            <div class="flex gap-2">
                <div class="glass px-3 py-1.5 rounded-lg flex flex-col justify-center border-l-2 border-amber-500" aria-label="Informasi Pangkat">
                    <span class="text-[9px] text-slate-400 uppercase tracking-wider">Pangkat</span>
                    <span id="rank-title" class="font-bold text-sm text-amber-500">Warrior</span>
                </div>
                <div class="glass px-3 py-1.5 rounded-lg flex flex-col justify-center border-l-2 border-orange-500" aria-label="Informasi Streak">
                    <span class="text-[9px] text-slate-400 uppercase tracking-wider">Streak</span>
                    <span class="font-bold text-sm text-orange-400">🔥 <span id="streak-count">0</span> Hari</span>
                </div>
            </div>
            
            <div id="timer-container" class="fade-transition fade-out flex flex-col items-start mt-2 hidden">
                <div id="timer" class="text-6xl font-light tracking-tighter text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]" aria-live="polite">00:00</div>
                <button onclick="abortSession()" class="mt-2 text-xs text-red-400/70 hover:text-red-400 font-bold uppercase tracking-wider transition px-2 py-1 rounded hover:bg-red-500/10" aria-label="Batalkan Misi Saat Ini">⏹ Batalkan Misi</button>
            </div>
        </div>
        
        <div class="flex flex-col items-end gap-3 w-full md:w-auto">
            <button onclick="toggleJournal()" class="glass px-5 py-2.5 rounded-full text-sm font-bold hover:bg-indigo-600/30 transition shadow-lg w-full md:w-auto text-center border-indigo-500/50" aria-label="Buka Database Sentral">
                📊 Database Sentral
            </button>
            <div class="glass px-2 py-1 rounded-full flex items-center gap-2 shadow-lg w-full md:w-auto justify-between">
                <label for="audio-source" class="sr-only">Pilih Sumber Audio</label>
                <select id="audio-source" onchange="changeAudioSource()" class="bg-transparent text-xs text-indigo-200 outline-none cursor-pointer pl-2 w-full md:w-40 appearance-none font-semibold">
                    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3">🌌 Deep Space</option>
                    <option value="https://upload.wikimedia.org/wikipedia/commons/b/b5/Rain_on_a_Tin_Roof.ogg">🌧️ Rainstorm</option>
                    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3">🎧 Lo-Fi Synth</option>
                    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-14.mp3">🧘 Binaural Flow</option>
                    <option value="https://upload.wikimedia.org/wikipedia/commons/5/52/River_stream_-_Sound_Effect.ogg">🌲 Forest Stream</option>
                </select>
                <button id="audio-toggle" onclick="toggleAudio()" class="p-2 rounded-full hover:bg-white/10 transition bg-indigo-500/20" aria-label="Nyalakan atau Matikan Audio">
                    <svg id="vol-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-50" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.983 5.983 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.984 3.984 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="relative z-40 w-full max-w-4xl px-4 md:px-6 mb-8 md:mb-12">
        <div class="glass rounded-3xl p-6 md:p-8 min-h-[220px] shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex flex-col justify-between border-t border-white/20">
            <div id="dialog-container" class="flex-1" aria-live="polite">
                <p id="dialog-text" class="font-serif text-xl md:text-3xl italic leading-relaxed min-h-[80px] text-indigo-50"></p>
            </div>

            <div id="home-controls" class="mt-6 flex flex-col md:flex-row gap-3 items-center fade-transition fade-in w-full">
                <label for="category" class="sr-only">Pilih Kategori Fokus</label>
                <select id="category" class="w-full md:w-36 bg-slate-900/60 border border-indigo-500/30 rounded-xl px-4 py-3.5 outline-none text-sm">
                    <option value="Akademik">📚 Akademik</option>
                    <option value="Koding">💻 Koding</option>
                    <option value="Desain">🎨 Desain</option>
                    <option value="Istirahat">☕ Istirahat</option>
                </select>
                
                <label for="user-intent" class="sr-only">Tuliskan target utamamu</label>
                <input type="text" id="user-intent" placeholder="Sebutkan target utamamu hari ini..." autocomplete="off" class="w-full flex-1 bg-slate-900/60 border border-indigo-500/30 rounded-xl px-5 py-3.5 focus:outline-none focus:border-indigo-400 text-sm">
                
                <label for="duration" class="sr-only">Pilih Durasi Waktu</label>
                <select id="duration" class="w-full md:w-32 bg-slate-900/60 border border-indigo-500/30 rounded-xl px-4 py-3.5 outline-none text-sm">
                    <option value="1">1 Menit (Tes)</option>
                    <option value="25" selected>25 Menit</option>
                    <option value="45">45 Menit</option>
                    <option value="90">90 Menit</option>
                </select>
                <button onclick="startFocusSession()" id="btn-start" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 px-8 py-3.5 rounded-xl font-bold shadow-[0_0_15px_rgba(79,70,229,0.5)] active:scale-95 text-sm transition-transform border border-indigo-400/30" aria-label="Mulai Sesi Fokus">Inisiasi</button>
            </div>

            <div id="reward-controls" class="mt-6 fade-transition fade-out w-full flex gap-4 hidden">
                <button onclick="resetApp()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-transform text-sm md:text-base border border-emerald-400/30" aria-label="Selesaikan Misi dan Kembali ke Menu">Misi Selesai (Kembali ke Radar)</button>
            </div>
        </div>
    </main>

    <div id="journal-modal" class="fixed inset-0 z-50 glass fade-transition fade-out flex items-center justify-center p-4 hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="bg-slate-900 w-full max-w-3xl rounded-3xl p-6 md:p-8 border border-white/10 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modal-title" class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg>
                    Database Lokal
                </h2>
                <button onclick="toggleJournal()" class="text-white/50 hover:text-white text-3xl transition" aria-label="Tutup Jurnal">&times;</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-indigo-500/10 p-3 rounded-xl border border-indigo-500/20 text-center">
                    <div class="text-xs text-slate-400 uppercase tracking-widest mb-1">Total Durasi Fokus</div>
                    <div class="text-xl font-bold text-indigo-300"><span id="stat-total-mins">0</span> Menit</div>
                </div>
                <div class="bg-indigo-500/10 p-3 rounded-xl border border-indigo-500/20 text-center">
                    <div class="text-xs text-slate-400 uppercase tracking-widest mb-1">Total Misi Selesai</div>
                    <div class="text-xl font-bold text-indigo-300"><span id="stat-sessions">0</span> Misi</div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-slate-800/60 p-3 rounded-xl border border-white/5 gap-3">
                <span class="text-xs text-slate-400 text-center md:text-left">Semua data diamankan secara terenkripsi murni di peramban Anda.</span>
                <div class="flex gap-2">
                    <button onclick="exportData()" class="bg-indigo-600/80 hover:bg-indigo-500 text-[10px] uppercase font-bold px-4 py-2 rounded transition shadow-md" aria-label="Ekspor Data JSON">⬇️ Export JSON</button>
                    <label class="bg-slate-700/80 hover:bg-slate-600 text-[10px] uppercase font-bold px-4 py-2 rounded transition shadow-md cursor-pointer">
                        ⬆️ Import Data
                        <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                    </label>
                </div>
            </div>
            
            <div class="overflow-y-auto custom-scroll flex-1 pr-2 w-full">
                <div class="bg-slate-800/40 p-5 rounded-2xl border border-white/5 mb-4 shadow-inner" aria-hidden="true">
                    <div class="flex justify-between text-xs font-bold mb-3">
                        <span class="text-indigo-300 uppercase tracking-wider">Progres Pangkat Selanjutnya</span>
                        <span id="exp-text" class="text-amber-500 bg-amber-500/10 px-2 py-1 rounded">0 / 200 EXP</span>
                    </div>
                    <div class="w-full h-3 bg-slate-900 rounded-full overflow-hidden border border-white/5">
                        <div id="modal-exp-bar" class="h-full bg-gradient-to-r from-amber-500 via-orange-400 to-indigo-500 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>

                <div class="bg-slate-800/40 p-4 rounded-2xl border border-white/5 mb-6 w-full h-40 relative" aria-hidden="true">
                    <canvas id="focusChart" class="w-full h-full"></canvas>
                </div>

                <h3 class="text-sm font-bold text-slate-400 mb-3 uppercase tracking-widest pl-1 border-l-2 border-indigo-500">Riwayat Misi Log</h3>
                <div id="journal-content" class="space-y-3" aria-live="polite"></div>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop preload="auto" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>
    <audio id="chime" preload="auto" src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Desktop_bell.ogg"></audio>

    <script>
        // --- 0. KONFIGURASI SISTEM ---
        const GEMINI_API_KEY = ""; 
        
        let targetTimestamp = 0, totalSeconds = 0, timerInterval = null, timerActive = false;
        let audioPlaying = false, chartInstance = null, typingInterval = null;
        let milestones = { half: false, fiveMin: false, oneMin: false, critical: false };

        const ui = {
            dialog: document.getElementById('dialog-text'),
            overlay: document.getElementById('overlay'),
            timerContainer: document.getElementById('timer-container'),
            timer: document.getElementById('timer'),
            homeControls: document.getElementById('home-controls'),
            rewardControls: document.getElementById('reward-controls'),
            journalModal: document.getElementById('journal-modal'),
            journalContent: document.getElementById('journal-content'),
            orb: document.getElementById('elara-orb'),
            btnStart: document.getElementById('btn-start')
        };

        // --- 1. KEAMANAN & PENGELOLAAN DATA (BUG FIX: DATA BINDING) ---
        function sanitizeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>"']/g, function(m) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]; });
        }

        // Hanya untuk mengambil data dari LocalStorage
        function safeGetLocalJSON(key, defaultVal) {
            try { const val = localStorage.getItem(key); return val ? JSON.parse(val) : defaultVal; } 
            catch (e) { return defaultVal; }
        }
        
        function safeGetLocalArray(key) {
            try { 
                const val = localStorage.getItem(key);
                const parsed = val ? JSON.parse(val) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch (e) { return []; }
        }
        
        function safeGetLocalInt(key, defaultVal) {
            const val = parseInt(localStorage.getItem(key)); return isNaN(val) ? defaultVal : val;
        }

        // --- 2. SISTEM RPG EKSPOENENSIAL ---
        const RANKS = [
            { max: 200, name: "Warrior", color: "text-amber-600" },
            { max: 700, name: "Elite", color: "text-slate-300" },
            { max: 1500, name: "Master", color: "text-yellow-500" },
            { max: 3500, name: "Grandmaster", color: "text-emerald-400" },
            { max: 7000, name: "Epic", color: "text-green-500" },
            { max: 15000, name: "Legend", color: "text-purple-400" },
            { max: Infinity, name: "Mythic", color: "text-pink-500" }
        ];

        function loadPlayerData() {
            const exp = safeGetLocalInt('mindful_exp', 0);
            let currentRank = RANKS[0], prevMax = 0;
            for (let r of RANKS) { if (exp < r.max) { currentRank = r; break; } prevMax = r.max; }
            
            document.getElementById('rank-title').innerText = currentRank.name; 
            document.getElementById('rank-title').className = `font-bold text-sm ${currentRank.color}`;
            
            const expInCurrentRank = exp - prevMax; 
            const rankRange = currentRank.max - prevMax;
            const progress = Math.min((expInCurrentRank / rankRange) * 100, 100);
            
            document.getElementById('modal-exp-bar').style.width = `${progress}%`;
            document.getElementById('exp-text').innerText = `${exp} / ${currentRank.max} EXP`;
            checkStreak();
        }

        function checkStreak() {
            const lastDate = localStorage.getItem('last_focus_date');
            let streak = safeGetLocalInt('mindful_streak', 0);
            const today = new Date().toISOString().split('T')[0];
            if (lastDate && lastDate !== today) {
                const diffDays = Math.ceil(Math.abs(new Date(today) - new Date(lastDate)) / (1000 * 60 * 60 * 24)); 
                if (diffDays > 1) { streak = 0; localStorage.setItem('mindful_streak', 0); }
            }
            document.getElementById('streak-count').innerText = streak;
        }

        // --- 3. MANAJEMEN AUDIO & NOTIFIKASI OS ---
        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        let audioUnlocked = false;
        function unlockAudio() {
            if (audioUnlocked) return;
            const bgMusic = document.getElementById('bg-music'), chime = document.getElementById('chime');
            bgMusic.play().then(() => bgMusic.pause()).catch(() => {});
            chime.play().then(() => { chime.pause(); chime.currentTime = 0; }).catch(() => {});
            audioUnlocked = true; document.removeEventListener('click', unlockAudio);
        }
        document.addEventListener('click', unlockAudio);

        function toggleAudio() {
            const music = document.getElementById('bg-music'), icon = document.getElementById('vol-icon');
            if (audioPlaying) { 
                music.pause(); icon.style.opacity = '0.5'; audioPlaying = false; 
            } else {
                let playPromise = music.play();
                if (playPromise !== undefined) { 
                    playPromise.then(_ => { icon.style.opacity = '1'; audioPlaying = true; })
                    .catch(e => { console.warn("Autoplay ditolak sistem."); }); 
                }
            }
        }

        function changeAudioSource() {
            const music = document.getElementById('bg-music');
            const isCurrentlyPlaying = audioPlaying;
            music.src = document.getElementById('audio-source').value;
            if (isCurrentlyPlaying) {
                let playPromise = music.play();
                if (playPromise !== undefined) playPromise.catch(e => console.warn("Buffering interrupt."));
            }
        }

        // --- 4. STATE MANAGEMENT & ANIMASI TEKS ---
        function switchState(hideEl, showEl) {
            if(hideEl) { 
                hideEl.classList.remove('fade-in'); hideEl.classList.add('fade-out'); 
                setTimeout(() => { if(hideEl.classList.contains('fade-out')) hideEl.classList.add('hidden'); }, 400); 
            }
            if(showEl) { 
                showEl.classList.remove('hidden'); 
                void showEl.offsetWidth; 
                showEl.classList.remove('fade-out'); showEl.classList.add('fade-in'); 
            }
        }

        async function typeWriter(text) {
            if (typingInterval) clearInterval(typingInterval);
            ui.dialog.innerHTML = ''; let i = 0;
            return new Promise(res => {
                typingInterval = setInterval(() => {
                    if (i < text.length) { ui.dialog.innerHTML += text.charAt(i); i++; } 
                    else { clearInterval(typingInterval); typingInterval = null; res(); }
                }, 30);
            });
        }

        // --- 5. LOGIKA FOKUS INTI & TIMEOUT API ---
        async function getAIResponse(intent, category) {
            if(!GEMINI_API_KEY) return `Sistem mengunci target pada [${category}]. Fokuskan analisamu pada "${intent}". Aku menjaga stabilitas di belakang layar.`;
            const fallbackMsg = `Koneksi dialihkan. Protokol lokal aktif: Fokus penuh pada "${intent}".`;
            try {
                const fetchPromise = fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Kamu Elara, AI pendamping produktivitas. Pengguna fokus: ${category}. Tugas: "${intent}". Beri SATU kalimat penyemangat ringkas (maks 15 kata).` }]}]})
                }).then(res => res.json()).then(data => data.candidates[0].content.parts[0].text);
                
                const timeoutPromise = new Promise(r => setTimeout(() => r(fallbackMsg), 5000));
                return await Promise.race([fetchPromise, timeoutPromise]);
            } catch (err) { return fallbackMsg; }
        }

        async function startFocusSession() {
            const rawIntent = document.getElementById('user-intent').value.trim();
            const category = document.getElementById('category').value;
            const safeIntent = sanitizeHTML(rawIntent);
            
            if (!safeIntent) { typeWriter("Logika ditolak: Target eksekusi wajib dimasukkan."); return; }
            if (timerInterval) clearInterval(timerInterval);
            
            requestNotificationPermission(); 
            
            ui.btnStart.innerText = "Memproses..."; ui.btnStart.disabled = true;
            typeWriter("Menghubungkan jaringan...");
            
            const aiMessage = await getAIResponse(safeIntent, category);
            const duration = parseInt(document.getElementById('duration').value);
            
            totalSeconds = duration * 60; 
            targetTimestamp = Date.now() + (totalSeconds * 1000); 
            milestones = { half: false, fiveMin: false, oneMin: false, critical: false };
            timerActive = true;
            
            ui.orb.className = 'ai-orb focus-mode'; 
            switchState(ui.homeControls, ui.timerContainer);
            typeWriter(aiMessage);
            
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (!timerActive) return;
            const now = Date.now();
            const remainSecs = Math.max(0, Math.round((targetTimestamp - now) / 1000));
            
            ui.timer.innerText = `${Math.floor(remainSecs / 60).toString().padStart(2, '0')}:${(remainSecs % 60).toString().padStart(2, '0')}`;
            ui.overlay.style.opacity = (1 - (remainSecs / totalSeconds)) * 0.8;
            
            if (totalSeconds > 60) {
                if (remainSecs <= 30 && !milestones.critical) {
                    milestones.critical = true; ui.orb.className = 'ai-orb critical-mode';
                    milestones.oneMin = true; milestones.half = true;
                } else if (remainSecs <= 60 && !milestones.oneMin) {
                    milestones.oneMin = true; typeWriter("1 menit tersisa. Kunci pikiranmu sekarang.");
                    milestones.half = true; 
                } else if (remainSecs <= Math.floor(totalSeconds / 2) && !milestones.half) {
                    milestones.half = true; typeWriter("Siklus mencapai 50%. Efisiensi sistem stabil. Terus melangkah.");
                }
            } else {
                if (remainSecs <= 15 && !milestones.critical) {
                    milestones.critical = true; ui.orb.className = 'ai-orb critical-mode';
                }
            }
            
            if (remainSecs <= 0) { 
                timerActive = false; clearInterval(timerInterval); finishFocus(); 
            }
        }

        // --- 6. PEMBATALAN & PENYELESAIAN ---
        function abortSession() {
            if (timerInterval) clearInterval(timerInterval); 
            timerActive = false; ui.orb.className = 'ai-orb'; ui.overlay.style.opacity = 0;
            switchState(ui.timerContainer, ui.homeControls);
            ui.btnStart.innerText = "Inisiasi"; ui.btnStart.disabled = false;
            typeWriter("Misi dibatalkan. Hitung mundur dihentikan. Sistem siap sedia.");
        }

        function finishFocus() {
            const chime = document.getElementById('chime');
            let chimePromise = chime.play();
            if (chimePromise !== undefined) chimePromise.catch(e => console.warn("Bel dicegah sistem."));

            switchState(ui.timerContainer, ui.rewardControls); 
            ui.overlay.style.opacity = 0.8; ui.orb.className = 'ai-orb'; 
            
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("Siklus Selesai", { body: "Kerja bagus! Waktu fokusmu berakhir. Periksa EXP yang didapat." });
            }

            const dur = parseInt(document.getElementById('duration').value);
            typeWriter(`Misi terselesaikan 100%. Algoritma mencatat keberhasilanmu. +${dur * 10} EXP ditambahkan.`);
            
            const cat = document.getElementById('category').value;
            const safeIntent = sanitizeHTML(document.getElementById('user-intent').value.trim());
            saveJournal(cat, safeIntent, dur);
            
            let exp = safeGetLocalInt('mindful_exp', 0);
            localStorage.setItem('mindful_exp', exp + (dur * 10));
            
            const today = new Date().toISOString().split('T')[0];
            if (localStorage.getItem('last_focus_date') !== today) {
                let streak = safeGetLocalInt('mindful_streak', 0);
                localStorage.setItem('mindful_streak', streak + 1); localStorage.setItem('last_focus_date', today);
            }
        }

        function saveJournal(cat, intent, dur) {
            const logs = safeGetLocalArray('mindful_logs');
            logs.push({ 
                date: new Date().toLocaleDateString('id-ID', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' }), 
                rawDate: new Date().toISOString().split('T')[0], 
                category: cat, 
                intent: intent, 
                duration: parseInt(dur) || 0 
            });
            localStorage.setItem('mindful_logs', JSON.stringify(logs));
        }

        function resetApp() {
            ui.btnStart.innerText = "Inisiasi"; ui.btnStart.disabled = false;
            switchState(ui.rewardControls, ui.homeControls);
            ui.overlay.style.opacity = 0; document.getElementById('user-intent').value = ''; init();
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && timerActive) {
                if (document.getElementById('category').value === 'Istirahat') {
                    typeWriter("⚠️ Peringatan: Ini siklus istirahat. Pindah tab mendisrupsi proses pemulihanmu.");
                }
            }
        });

        // --- 7. DATABASE EKSPOR/IMPOR & ANALITIK KANVAS (BUG FIX CHART) ---
        function toggleJournal() {
            if (ui.journalModal.classList.contains('fade-out') || ui.journalModal.classList.contains('hidden')) {
                loadPlayerData(); 
                renderJournal(); 
                switchState(null, ui.journalModal);
                // Menunggu transisi CSS selesai agar Chart.js mendapatkan dimensi canvas yang benar
                setTimeout(renderChart, 100);
            } else {
                switchState(ui.journalModal, null);
            }
        }

        function renderJournal() {
            const logs = safeGetLocalArray('mindful_logs');
            
            // BUG FIX: Kalkulasi Total Durasi dan Sesi
            let totalMins = 0;
            logs.forEach(l => { totalMins += (Number(l.duration) || 0); });
            document.getElementById('stat-total-mins').innerText = totalMins;
            document.getElementById('stat-sessions').innerText = logs.length;

            const catColors = { 'Akademik': 'bg-blue-500/20 text-blue-300', 'Koding': 'bg-purple-500/20 text-purple-300', 'Desain': 'bg-pink-500/20 text-pink-300', 'Istirahat': 'bg-emerald-500/20 text-emerald-300' };
            
            ui.journalContent.innerHTML = logs.reverse().map(l => `
                <div class="p-4 bg-slate-800/40 rounded-xl border border-white/5 flex justify-between items-center hover:bg-slate-800/60 transition">
                    <div>
                        <div class="flex gap-2 mb-1">
                            <span class="${catColors[sanitizeHTML(l.category)] || 'bg-slate-500/20'} text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wide">${sanitizeHTML(l.category)}</span>
                            <span class="text-[10px] text-slate-400 font-semibold">${sanitizeHTML(l.date)}</span>
                        </div>
                        <h3 class="text-sm font-semibold text-white break-words max-w-[200px] md:max-w-md">${sanitizeHTML(l.intent)}</h3>
                    </div><span class="text-indigo-400 font-bold text-sm bg-indigo-500/10 px-2 py-1 rounded">+${Number(l.duration) || 0} Mnt</span>
                </div>
            `).join('') || '<p class="text-center text-slate-500 py-8 text-sm">Database masih kosong. Lakukan inisiasi pertamamu.</p>';
        }

        function renderChart() {
            const logs = safeGetLocalArray('mindful_logs');
            const gData = {}; 
            
            // BUG FIX: Menggunakan tipe data number murni pada l.duration
            logs.forEach(l => { 
                const dateKey = sanitizeHTML(l.rawDate);
                gData[dateKey] = (gData[dateKey] || 0) + (Number(l.duration) || 0); 
            });
            
            const labels = Object.keys(gData).slice(-7), dataPoints = labels.map(d => gData[d]);
            
            if(chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('focusChart');
            if(!ctx) return;
            
            Chart.defaults.color = '#94a3b8'; Chart.defaults.font.family = 'Inter';
            chartInstance = new Chart(ctx.getContext('2d'), {
                type: 'bar', data: { labels: labels.length ? labels : ['Data Kosong'], datasets: [{ label: 'Fokus (Menit)', data: dataPoints.length ? dataPoints : [0], backgroundColor: 'rgba(99, 102, 241, 0.8)', borderRadius: 4 }] },
                options: { maintainAspectRatio: false, responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
            });
        }

        function exportData() {
            const data = { 
                exp: safeGetLocalInt('mindful_exp', 0), 
                logs: safeGetLocalArray('mindful_logs'), 
                streak: safeGetLocalInt('mindful_streak', 0), 
                lastDate: localStorage.getItem('last_focus_date') || '' 
            };
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type: 'application/json'}));
            a.download = `MindfulQuest_Backup_${new Date().toISOString().split('T')[0]}.json`; a.click();
        }

        function importData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(data.exp !== undefined) localStorage.setItem('mindful_exp', data.exp);
                    if(data.logs !== undefined) localStorage.setItem('mindful_logs', Array.isArray(data.logs) ? JSON.stringify(data.logs) : '[]');
                    if(data.streak !== undefined) localStorage.setItem('mindful_streak', data.streak);
                    if(data.lastDate !== undefined) localStorage.setItem('last_focus_date', sanitizeHTML(data.lastDate));
                    alert('Sistem berhasil dipulihkan secara penuh!'); location.reload();
                } catch(err) { alert('Format file backup tidak valid atau data telah terkorupsi.'); }
            };
            reader.readAsText(file);
        }

        async function init() { loadPlayerData(); await typeWriter("Sistem aktif. Aku siap mendengarkan. Apa prioritas utama kita saat ini?"); }
        window.onload = init;
    </script>
</body>
</html>
