<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful Quest - Elara's Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:italic,wght@0,400;1,500&family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; overflow: hidden; background: #000; }
        .font-lora { font-family: 'Lora', serif; }
        
        .breathing {
            animation: breathe 5s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, 0) scale(1); }
            50% { transform: translate(-50%, -10px) scale(1.01); }
        }

        .ring-anim {
            animation: ring 4s ease-in-out infinite;
        }
        @keyframes ring {
            0% { transform: scale(0.8); opacity: 0.2; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(0.8); opacity: 0.2; }
        }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* Smooth state transitions */
        .fade-transition {
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .fade-out {
            opacity: 0;
            visibility: hidden;
            position: absolute; /* Prevent layout shifting */
        }
        .fade-in {
            opacity: 1;
            visibility: visible;
            position: relative;
        }
    </style>
</head>
<body class="relative h-screen w-full flex flex-col items-center justify-between text-white">

    <div class="fixed inset-0 z-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1518112390110-6012b1f5c2e1?auto=format&fit=crop&q=80&w=2000')"></div>
    
    <div id="overlay" class="fixed inset-0 z-10 bg-black pointer-events-none" style="opacity: 0; transition: opacity 1s linear;"></div>

    <img id="elara" src="https://placehold.co/400x600/1e1b4b/a5b4fc.png?text=Aset+Karakter+Elara" 
         class="fixed bottom-0 left-1/2 -translate-x-1/2 h-[85vh] z-20 breathing object-contain pointer-events-none" alt="Elara">

    <header class="relative z-40 w-full p-6 flex justify-between items-start">
        <div class="flex flex-col gap-1">
            <h1 class="text-2xl font-bold tracking-widest text-indigo-300 drop-shadow-md">MINDFUL QUEST</h1>
            <div id="timer" class="text-4xl font-light tracking-tighter fade-transition fade-out opacity-90">00:00</div>
        </div>
        <div class="flex gap-4">
            <button onclick="toggleJournal()" class="glass px-4 py-2 rounded-full text-sm font-semibold hover:bg-white/10 transition">Jurnal Saya</button>
            <button id="audio-toggle" onclick="toggleAudio()" class="glass p-3 rounded-full hover:bg-white/10 transition">
                <svg id="vol-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-50" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.983 5.983 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.984 3.984 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>
    </header>

    <div id="breath-ring" class="fixed inset-0 flex items-center justify-center z-30 fade-transition fade-out">
        <div class="w-64 h-64 border-4 border-indigo-400 rounded-full ring-anim"></div>
    </div>

    <main class="relative z-40 w-full max-w-4xl px-6 mb-12">
        <div class="glass rounded-3xl p-8 min-h-[220px] shadow-2xl flex flex-col justify-between">
            <div id="dialog-container" class="flex-1">
                <span class="text-indigo-300 font-bold text-xs tracking-widest uppercase mb-2 block">Elara</span>
                <p id="dialog-text" class="font-lora text-xl md:text-2xl italic leading-relaxed min-h-[60px]"></p>
            </div>

            <div id="home-controls" class="mt-6 flex flex-col md:flex-row gap-4 items-center fade-transition fade-in">
                <input type="text" id="user-intent" placeholder="Fokusku hari ini adalah..." 
                       class="w-full flex-1 bg-white/10 border border-white/20 rounded-xl px-5 py-3 focus:outline-none focus:border-indigo-400 transition">
                <select id="duration" class="w-full md:w-32 bg-slate-800 border border-white/20 rounded-xl px-4 py-3 outline-none cursor-pointer hover:bg-slate-700 transition">
                    <option value="1">1 Menit</option>
                    <option value="25" selected>25 Menit</option>
                    <option value="45">45 Menit</option>
                </select>
                <button onclick="startBreathing()" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 px-8 py-3 rounded-xl font-bold transition-all shadow-lg active:scale-95">Mulai Perjalanan</button>
            </div>

            <div id="reward-controls" class="mt-6 fade-transition fade-out">
                <button onclick="resetApp()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition shadow-lg active:scale-95">Kembali ke Realita</button>
            </div>
        </div>
    </main>

    <div id="journal-modal" class="fixed inset-0 z-50 glass fade-transition fade-out flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-lg rounded-3xl p-8 border border-white/10 shadow-2xl flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold tracking-tight">Jurnal Ketenangan</h2>
                <button onclick="toggleJournal()" class="text-white/50 hover:text-white text-3xl">&times;</button>
            </div>
            <div id="journal-content" class="overflow-y-auto custom-scroll flex-1 pr-2 space-y-4">
                </div>
        </div>
    </div>

    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>
    <audio id="chime" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        let totalSeconds = 0;
        let timeLeft = 0;
        let timerInterval = null;
        let isPaused = false;
        let audioPlaying = false;
        let milestones = { half: false, fiveMin: false, oneMin: false };

        const ui = {
            dialog: document.getElementById('dialog-text'),
            overlay: document.getElementById('overlay'),
            timer: document.getElementById('timer'),
            homeControls: document.getElementById('home-controls'),
            rewardControls: document.getElementById('reward-controls'),
            breathRing: document.getElementById('breath-ring'),
            journalModal: document.getElementById('journal-modal'),
            journalContent: document.getElementById('journal-content')
        };

        // Utility to handle fade transitions
        function switchState(hideElement, showElement) {
            if(hideElement) {
                hideElement.classList.remove('fade-in');
                hideElement.classList.add('fade-out');
            }
            if(showElement) {
                showElement.classList.remove('fade-out');
                showElement.classList.add('fade-in');
            }
        }

        async function typeWriter(text) {
            ui.dialog.innerHTML = '';
            let i = 0;
            return new Promise(resolve => {
                const interval = setInterval(() => {
                    if (i < text.length) {
                        ui.dialog.innerHTML += text.charAt(i);
                        i++;
                    } else {
                        clearInterval(interval);
                        resolve();
                    }
                }, 40); // Typewriting speed
            });
        }

        function toggleAudio() {
            const music = document.getElementById('bg-music');
            const icon = document.getElementById('vol-icon');
            if (audioPlaying) {
                music.pause();
                icon.style.opacity = '0.5';
            } else {
                music.play();
                icon.style.opacity = '1';
            }
            audioPlaying = !audioPlaying;
        }

        async function init() {
            await typeWriter("Selamat datang kembali. Aku Elara. Apa yang membebani pikiranmu hari ini?");
        }

        async function startBreathing() {
            const intent = document.getElementById('user-intent').value.trim();
            if (!intent) {
                typeWriter("Beri tahu aku dulu, apa fokusmu hari ini?");
                return;
            }
            
            switchState(ui.homeControls, ui.breathRing);
            await typeWriter("Tarik napas... Tahan... Hembuskan...");
            
            setTimeout(() => {
                switchState(ui.breathRing, null);
                startFocus(intent);
            }, 8000); // 8 seconds of breathing animation
        }

        function startFocus(intent) {
            const duration = parseInt(document.getElementById('duration').value);
            totalSeconds = duration * 60;
            timeLeft = totalSeconds;
            milestones = { half: false, fiveMin: false, oneMin: false };
            
            switchState(null, ui.timer);
            updateTimerDisplay();
            typeWriter(`Aku di sini menjagamu. Fokuslah pada "${intent}".`);
            
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (isPaused) return;

            timeLeft--;
            updateTimerDisplay();

            // Update Overlay Darkening for visual progression
            const opacity = (1 - (timeLeft / totalSeconds)) * 0.7;
            ui.overlay.style.opacity = opacity;

            // Milestones Logic (Passive Engagement)
            if (timeLeft === Math.floor(totalSeconds / 2) && !milestones.half) {
                milestones.half = true;
                typeWriter("Separuh perjalanan sudah berlalu. Kamu melakukan pekerjaan yang hebat.");
            } else if (timeLeft === 300 && totalSeconds > 300 && !milestones.fiveMin) {
                milestones.fiveMin = true;
                typeWriter("Tinggal 5 menit lagi. Tarik napas sejenak, selesaikan perlahan.");
            } else if (timeLeft === 60 && !milestones.oneMin) {
                milestones.oneMin = true;
                typeWriter("Satu menit terakhir. Bertahanlah, garis akhir sudah di depan mata.");
            }

            if (timeLeft <= 0) finishFocus();
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            ui.timer.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function finishFocus() {
            clearInterval(timerInterval);
            document.getElementById('chime').play();
            
            switchState(ui.timer, ui.rewardControls);
            ui.overlay.style.opacity = 0.7;
            
            typeWriter("Luar biasa. Kamu berhasil menaklukkan waktumu. Aku bangga padamu.");

            const intent = document.getElementById('user-intent').value;
            saveJournal(intent, document.getElementById('duration').value);
        }

        function saveJournal(intent, dur) {
            const logs = JSON.parse(localStorage.getItem('mindful_logs') || '[]');
            logs.push({
                date: new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' }),
                intent: intent,
                duration: dur
            });
            localStorage.setItem('mindful_logs', JSON.stringify(logs));
        }

        function toggleJournal() {
            if (ui.journalModal.classList.contains('fade-out')) {
                renderJournal();
                switchState(null, ui.journalModal);
            } else {
                switchState(ui.journalModal, null);
            }
        }

        function renderJournal() {
            const logs = JSON.parse(localStorage.getItem('mindful_logs') || '[]');
            ui.journalContent.innerHTML = logs.reverse().map(log => `
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition">
                    <p class="text-xs text-indigo-400 font-bold mb-1">${log.date}</p>
                    <h3 class="text-lg font-semibold text-white/90">🎯 ${log.intent}</h3>
                    <p class="text-sm text-white/50 italic">Fokus selama ${log.duration} menit</p>
                </div>
            `).join('') || '<p class="text-center text-white/30 py-10 italic">Belum ada catatan perjalanan...</p>';
        }

        function resetApp() {
            switchState(ui.rewardControls, ui.homeControls);
            ui.overlay.style.opacity = 0;
            document.getElementById('user-intent').value = '';
            init();
        }

        // Anti-cheat / Distraction handling
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && timerInterval && timeLeft > 0) {
                isPaused = true;
            } else if (!document.hidden && timerInterval && timeLeft > 0) {
                isPaused = false;
                typeWriter("Hei, kamu sempat terdistraksi ya? Tidak apa-apa, mari lanjutkan perjuangan ini.");
            }
        });

        // Initialize application
        window.onload = init;
    </script>
</body>
</html>
