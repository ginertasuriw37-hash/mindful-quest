<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful Quest - AI Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; background: #020617; color: white; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* 1. ANIMATED CSS BACKGROUND (Bebas Bug Gambar) */
        .aurora-bg {
            background: linear-gradient(-45deg, #020617, #1e1b4b, #0f172a, #312e81);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: fixed; inset: 0; z-index: 0;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. ELARA COMPANION ORB (Karakter SVG Animasi) */
        .orb-container {
            position: fixed; bottom: 20%; left: 50%; transform: translateX(-50%); z-index: 20;
            display: flex; flex-direction: column; items-center; justify-content: center;
        }
        .ai-orb {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #818cf8, #3730a3);
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.6), inset 0 0 20px rgba(255,255,255,0.5);
            animation: orbBreathe 4s ease-in-out infinite, orbFloat 6s ease-in-out infinite;
        }
        @keyframes orbBreathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(99, 102, 241, 0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(129, 140, 248, 0.8); }
        }
        @keyframes orbFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(129, 140, 248, 0.5); border-radius: 10px; }
        
        .fade-transition { transition: opacity 0.5s ease, visibility 0.5s ease, transform 0.5s ease; }
        .fade-out { opacity: 0; visibility: hidden; position: absolute; transform: translateY(10px); }
        .fade-in { opacity: 1; visibility: visible; position: relative; transform: translateY(0); }
    </style>
</head>
<body class="relative h-screen w-full flex flex-col items-center justify-between">

    <div class="aurora-bg"></div>
    <div id="overlay" class="fixed inset-0 z-10 bg-black pointer-events-none" style="opacity: 0; transition: opacity 1s linear;"></div>

    <div class="orb-container pointer-events-none">
        <div class="ai-orb"></div>
        <div class="mt-6 text-indigo-300/50 tracking-[0.3em] text-xs font-bold">ELARA.SYS</div>
    </div>

    <header class="relative z-40 w-full p-6 flex justify-between items-start">
        <div class="flex flex-col gap-2">
            <h1 class="text-xl font-bold tracking-widest text-indigo-100">MINDFUL QUEST</h1>
            <div class="flex gap-2">
                <div class="glass px-3 py-1.5 rounded-lg flex flex-col justify-center">
                    <span class="text-[9px] text-slate-400 uppercase tracking-wider">Pangkat</span>
                    <span id="rank-title" class="font-bold text-sm text-amber-500">Warrior</span>
                </div>
                <div class="glass px-3 py-1.5 rounded-lg flex flex-col justify-center">
                    <span class="text-[9px] text-slate-400 uppercase tracking-wider">Streak</span>
                    <span class="font-bold text-sm text-orange-400">🔥 <span id="streak-count">0</span> Hari</span>
                </div>
            </div>
            <div id="timer" class="text-6xl font-light tracking-tighter fade-transition fade-out opacity-90 mt-4 text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">00:00</div>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleJournal()" class="glass px-5 py-2.5 rounded-full text-sm font-bold hover:bg-indigo-600/30 transition flex items-center gap-2 shadow-lg">
                📊 Analitik
            </button>
            <button id="audio-toggle" onclick="toggleAudio()" class="glass p-3 rounded-full hover:bg-white/10 transition">
                <svg id="vol-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-50" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.983 5.983 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.984 3.984 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>
    </header>

    <main class="relative z-40 w-full max-w-4xl px-4 md:px-6 mb-8 md:mb-12">
        <div class="glass rounded-3xl p-6 md:p-8 min-h-[220px] shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex flex-col justify-between border-t border-white/20">
            <div id="dialog-container" class="flex-1">
                <p id="dialog-text" class="font-serif text-xl md:text-3xl italic leading-relaxed min-h-[80px] text-indigo-50"></p>
            </div>

            <div id="home-controls" class="mt-6 flex flex-col md:flex-row gap-3 items-center fade-transition fade-in w-full">
                <select id="category" class="w-full md:w-36 bg-slate-900/60 border border-indigo-500/30 rounded-xl px-4 py-3.5 outline-none cursor-pointer text-sm">
                    <option value="Akademik">📚 Akademik</option>
                    <option value="Koding">💻 Koding</option>
                    <option value="Desain">🎨 Desain</option>
                    <option value="Istirahat">☕ Istirahat</option>
                </select>
                <input type="text" id="user-intent" placeholder="Tugas apa yang harus diselesaikan?" 
                       class="w-full flex-1 bg-slate-900/60 border border-indigo-500/30 rounded-xl px-5 py-3.5 focus:outline-none focus:border-indigo-400 transition text-sm">
                <select id="duration" class="w-full md:w-32 bg-slate-900/60 border border-indigo-500/30 rounded-xl px-4 py-3.5 outline-none cursor-pointer text-sm">
                    <option value="1">1 Menit (Tes)</option>
                    <option value="25" selected>25 Menit</option>
                    <option value="45">45 Menit</option>
                </select>
                <button onclick="startFocusSession()" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 px-8 py-3.5 rounded-xl font-bold transition-all shadow-[0_0_15px_rgba(79,70,229,0.5)] active:scale-95 text-sm whitespace-nowrap">Eksekusi</button>
            </div>

            <div id="reward-controls" class="mt-6 fade-transition fade-out w-full flex gap-4">
                <button onclick="resetApp()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold transition shadow-lg active:scale-95 flex items-center justify-center gap-2">
                    Klaim EXP & Selesai
                </button>
            </div>
        </div>
    </main>

    <div id="journal-modal" class="fixed inset-0 z-50 glass fade-transition fade-out flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-3xl rounded-3xl p-6 md:p-8 border border-white/10 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold tracking-tight">Database Profil</h2>
                <button onclick="toggleJournal()" class="text-white/50 hover:text-white text-3xl">&times;</button>
            </div>
            
            <div class="overflow-y-auto custom-scroll flex-1 pr-2">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5 text-center">
                        <div class="text-xs text-slate-400 mb-1">Total Fokus</div>
                        <div class="text-xl font-bold text-indigo-400" id="stat-total-mins">0 Mnt</div>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5 text-center">
                        <div class="text-xs text-slate-400 mb-1">Total Sesi</div>
                        <div class="text-xl font-bold text-indigo-400" id="stat-sessions">0</div>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5 text-center col-span-2 md:col-span-2 flex flex-col justify-center">
                        <div class="text-xs text-slate-400 mb-1">Progres Menuju Rank Berikutnya</div>
                        <div class="w-full h-2 bg-slate-700 rounded-full mt-1">
                            <div id="modal-exp-bar" class="h-full bg-amber-400 rounded-full shadow-[0_0_10px_rgba(251,191,36,0.5)]" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5 mb-6">
                    <canvas id="focusChart" height="100"></canvas>
                </div>

                <h3 class="text-sm font-bold text-slate-400 mb-3 uppercase tracking-widest">Riwayat Eksekusi</h3>
                <div id="journal-content" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>
    <audio id="chime" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        let totalSeconds = 0, timeLeft = 0, timerInterval = null;
        let isPaused = false, audioPlaying = false;
        let chartInstance = null;

        const ui = {
            dialog: document.getElementById('dialog-text'),
            overlay: document.getElementById('overlay'),
            timer: document.getElementById('timer'),
            homeControls: document.getElementById('home-controls'),
            rewardControls: document.getElementById('reward-controls'),
            journalModal: document.getElementById('journal-modal'),
            journalContent: document.getElementById('journal-content')
        };

        // --- SISTEM DATABASE & GAMIFIKASI LOKAL ---
        const RANKS = [
            { max: 300, name: "Warrior", color: "text-amber-700" },
            { max: 800, name: "Elite", color: "text-slate-300" },
            { max: 1500, name: "Master", color: "text-yellow-500" },
            { max: 3000, name: "Grandmaster", color: "text-emerald-400" },
            { max: 5000, name: "Epic", color: "text-green-500" },
            { max: 10000, name: "Legend", color: "text-purple-400" },
            { max: Infinity, name: "Mythic", color: "text-pink-500" }
        ];

        function loadPlayerData() {
            const exp = parseInt(localStorage.getItem('mindful_exp') || '0');
            let currentRank = RANKS[0];
            let prevMax = 0;
            
            for (let r of RANKS) {
                if (exp < r.max) { currentRank = r; break; }
                prevMax = r.max;
            }

            const rankEl = document.getElementById('rank-title');
            rankEl.innerText = currentRank.name;
            rankEl.className = `font-bold text-sm ${currentRank.color}`;

            // Hitung persentase bar
            const expInCurrentRank = exp - prevMax;
            const rankRange = currentRank.max - prevMax;
            const progress = Math.min((expInCurrentRank / rankRange) * 100, 100);
            document.getElementById('modal-exp-bar').style.width = `${progress}%`;

            checkStreak();
        }

        function checkStreak() {
            const lastDate = localStorage.getItem('last_focus_date');
            let streak = parseInt(localStorage.getItem('mindful_streak') || '0');
            const today = new Date().toLocaleDateString('en-CA');

            if (lastDate) {
                const last = new Date(lastDate);
                const current = new Date(today);
                const diffTime = Math.abs(current - last);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 

                if (diffDays === 1) {
                    // Berkelanjutan
                } else if (diffDays > 1) {
                    streak = 0; // Terputus
                }
            }
            document.getElementById('streak-count').innerText = streak;
        }

        function updateStreakAndExp(minutes) {
            let exp = parseInt(localStorage.getItem('mindful_exp') || '0');
            exp += (minutes * 10);
            localStorage.setItem('mindful_exp', exp);

            const today = new Date().toLocaleDateString('en-CA');
            const lastDate = localStorage.getItem('last_focus_date');
            
            if (lastDate !== today) {
                let streak = parseInt(localStorage.getItem('mindful_streak') || '0');
                localStorage.setItem('mindful_streak', streak + 1);
                localStorage.setItem('last_focus_date', today);
            }
            loadPlayerData();
        }

        // --- CORE UI LOGIC ---
        function switchState(hideEl, showEl) {
            if(hideEl) { hideEl.classList.remove('fade-in'); hideEl.classList.add('fade-out'); }
            if(showEl) { showEl.classList.remove('fade-out'); showEl.classList.add('fade-in'); }
        }

        async function typeWriter(text) {
            ui.dialog.innerHTML = '';
            let i = 0;
            return new Promise(res => {
                const int = setInterval(() => {
                    if (i < text.length) { ui.dialog.innerHTML += text.charAt(i); i++; } 
                    else { clearInterval(int); res(); }
                }, 30);
            });
        }

        function toggleAudio() {
            const music = document.getElementById('bg-music'), icon = document.getElementById('vol-icon');
            audioPlaying ? music.pause() : music.play();
            icon.style.opacity = audioPlaying ? '0.5' : '1';
            audioPlaying = !audioPlaying;
        }

        async function init() {
            loadPlayerData();
            await typeWriter("Sistem aktif. Aku mendengarkan. Apa prioritas utama kita saat ini?");
        }

        function startFocusSession() {
            const intent = document.getElementById('user-intent').value.trim();
            const category = document.getElementById('category').value;
            if (!intent) { typeWriter("Identifikasi target terlebih dahulu sebelum memulai eksekusi."); return; }
            
            const duration = parseInt(document.getElementById('duration').value);
            totalSeconds = duration * 60; timeLeft = totalSeconds;
            
            switchState(ui.homeControls, ui.timer);
            updateTimerDisplay();
            typeWriter(`Mengeksekusi mode [${category}]. Fokuskan seluruh analisamu pada "${intent}". Aku akan menjaga stabilitas sistem.`);
            
            document.querySelector('.ai-orb').style.animationDuration = "2s, 6s"; // Detak jantung cepat saat fokus
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (isPaused) return;
            timeLeft--; updateTimerDisplay();
            ui.overlay.style.opacity = (1 - (timeLeft / totalSeconds)) * 0.8;

            if (timeLeft === Math.floor(totalSeconds / 2)) {
                typeWriter("50% progres tercapai. Efisiensimu terpantau sangat baik. Pertahankan.");
            } else if (timeLeft === 60) {
                typeWriter("Siklus hampir selesai. Fokuskan tenaga terakhirmu.");
            }

            if (timeLeft <= 0) finishFocus();
        }

        function updateTimerDisplay() {
            ui.timer.innerText = `${Math.floor(timeLeft / 60).toString().padStart(2, '0')}:${(timeLeft % 60).toString().padStart(2, '0')}`;
        }

        function finishFocus() {
            clearInterval(timerInterval); document.getElementById('chime').play();
            switchState(ui.timer, ui.rewardControls); ui.overlay.style.opacity = 0.8;
            document.querySelector('.ai-orb').style.animationDuration = "4s, 6s"; // Kembali normal
            
            const dur = parseInt(document.getElementById('duration').value);
            typeWriter(`Tugas selesai. Logika dan dedikasimu tidak pernah mengecewakan. Sistem mencatat +${dur * 10} EXP.`);

            saveJournal(document.getElementById('category').value, document.getElementById('user-intent').value, dur);
            updateStreakAndExp(dur);
        }

        function saveJournal(cat, intent, dur) {
            const logs = JSON.parse(localStorage.getItem('mindful_logs') || '[]');
            logs.push({
                date: new Date().toLocaleDateString('id-ID', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' }),
                rawDate: new Date().toLocaleDateString('en-CA'),
                category: cat, intent: intent, duration: dur
            });
            localStorage.setItem('mindful_logs', JSON.stringify(logs));
        }

        // --- DASHBOARD ANALITIK ---
        function toggleJournal() {
            if (ui.journalModal.classList.contains('fade-out')) {
                renderJournal(); renderChart(); switchState(null, ui.journalModal);
            } else {
                switchState(ui.journalModal, null);
            }
        }

        function renderJournal() {
            const logs = JSON.parse(localStorage.getItem('mindful_logs') || '[]');
            
            // Hitung Total Stat
            const totalMins = logs.reduce((sum, log) => sum + log.duration, 0);
            document.getElementById('stat-total-mins').innerText = `${totalMins} Mnt`;
            document.getElementById('stat-sessions').innerText = logs.length;

            const categoryColors = { 'Akademik': 'bg-blue-500/20 text-blue-300', 'Koding': 'bg-purple-500/20 text-purple-300', 'Desain': 'bg-pink-500/20 text-pink-300', 'Istirahat': 'bg-emerald-500/20 text-emerald-300' };

            ui.journalContent.innerHTML = logs.reverse().map(log => `
                <div class="p-4 bg-slate-800/40 rounded-xl border border-white/5 hover:bg-slate-800/60 transition flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="${categoryColors[log.category] || 'bg-slate-500/20'} text-[10px] px-2 py-0.5 rounded font-bold">${log.category}</span>
                            <span class="text-[10px] text-slate-400">${log.date}</span>
                        </div>
                        <h3 class="text-sm font-semibold text-white">${log.intent}</h3>
                    </div>
                    <div class="text-right">
                        <span class="text-indigo-400 font-bold text-sm">+${log.duration} Mnt</span>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-slate-500 py-5 text-sm">Database masih kosong. Mulai eksekusi pertamamu.</p>';
        }

        function renderChart() {
            const logs = JSON.parse(localStorage.getItem('mindful_logs') || '[]');
            const groupedData = {};
            logs.forEach(log => { groupedData[log.rawDate] = (groupedData[log.rawDate] || 0) + log.duration; });

            const labels = Object.keys(groupedData).slice(-7);
            const dataPoints = labels.map(d => groupedData[d]);

            if(chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('focusChart').getContext('2d');
            Chart.defaults.color = '#94a3b8'; Chart.defaults.font.family = 'Inter';

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.length ? labels : ['Data Kosong'],
                    datasets: [{
                        label: 'Durasi Fokus (Menit)',
                        data: dataPoints.length ? dataPoints : [0],
                        borderColor: '#818cf8', backgroundColor: 'rgba(129, 140, 248, 0.2)',
                        borderWidth: 2, tension: 0.4, fill: true, pointBackgroundColor: '#fff'
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
            });
        }

        function resetApp() {
            switchState(ui.rewardControls, ui.homeControls);
            ui.overlay.style.opacity = 0; document.getElementById('user-intent').value = ''; init();
        }

        // Anti-cheat System
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && timerInterval && timeLeft > 0) isPaused = true;
            else if (!document.hidden && timerInterval && timeLeft > 0) {
                isPaused = false;
                typeWriter("Peringatan: Kehilangan fokus terdeteksi. Segera kalibrasi ulang perhatianmu.");
            }
        });

        window.onload = init;
    </script>
</body>
</html>
